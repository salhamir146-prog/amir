* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Shabnam', sans-serif;
  background: #e8f5e9;
  direction: rtl;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 24px 12px;
}

.cal-wrap {
  background: #fff;
  border-radius: 18px;
  box-shadow: 0 6px 32px rgba(0,100,0,0.13);
  width: 100%;
  max-width: 860px;
  overflow: hidden;
}

/* ── TOP BAR ── */
.top-bar {
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 24px 10px;
  border-bottom: 2px solid #e8f5e9;
}
.top-year {
  font-size: 52px;
  font-weight: bold;
  color: #1b5e20;
  line-height: 1;
}
.top-clock-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.top-clock {
  font-size: 30px;
  font-weight: bold;
  color: #fff;
  background: linear-gradient(135deg, #2e7d32, #43a047);
  border-radius: 12px;
  padding: 8px 22px;
  letter-spacing: 3px;
  direction: ltr;
  box-shadow: 0 2px 10px rgba(46,125,50,0.3);
}
.top-clock-label {
  font-size: 11px;
  color: #aaa;
}
.top-meta {
  font-size: 12px;
  color: #888;
  text-align: left;
  line-height: 1.8;
}

/* ── MONTH NAV ── */
.month-nav-bar {
  background: #f9fbe7;
  border-bottom: 2px solid #e8f5e9;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
}
.month-nav-bar .month-letter {
  font-size: 13px;
  color: #666;
  cursor: pointer;
  padding: 4px 7px;
  border-radius: 7px;
  transition: all 0.15s;
  white-space: nowrap;
}
.month-nav-bar .month-letter:hover {
  background: #c8e6c9;
  color: #1b5e20;
}
.month-nav-bar .month-letter.active-season-cr {
  background: #2e7d32;
  color: #fff !important;
  font-weight: bold;
  border-radius: 7px;
}

/* ── MONTH TITLE ── */
.month-title-row {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px 24px 4px;
  gap: 12px;
}
.month-title-row .month-name {
  font-size: 26px;
  font-weight: bold;
  color: #fff;
  background: linear-gradient(135deg, #2e7d32, #66bb6a);
  border-radius: 10px;
  padding: 4px 28px;
}

/* ── WEEKDAY HEADER ── */
.weekday-header {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 6px 16px 2px;
  border-bottom: 1px solid #e8f5e9;
}
.weekday-header div {
  text-align: center;
  font-size: 13px;
  font-weight: bold;
  color: #555;
  padding: 4px 0;
}
.weekday-header div:last-child { color: #c62828; }

/* ── DATE GRID ── */
.date-grid {
  padding: 6px 16px 10px;
}
.week-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  margin-bottom: 4px;
}
.day-cell {
  text-align: center;
  padding: 5px 1px;
  border-radius: 9px;
  cursor: pointer;
  transition: background 0.15s;
  min-height: 54px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.day-cell:hover:not(.disable-one) { background: #e8f5e9; }
.day-cell .jal {
  font-size: 20px;
  font-weight: bold;
  color: #222;
  line-height: 1.2;
}
.day-cell .sub {
  font-size: 10px;
  color: #bbb;
  line-height: 1.3;
}
.day-cell.holiday .jal { color: #c62828; }
.day-cell.disable-one { opacity: 0.2; pointer-events: none; }

/* today */
.day-cell.today-cell {
  background: #2e7d32;
  border-radius: 9px;
}
.day-cell.today-cell .jal { color: #fff; }
.day-cell.today-cell .sub { color: rgba(255,255,255,0.65); }

/* selected */
.day-cell.selected-cell:not(.today-cell) {
  background: #c8e6c9;
  border: 2px solid #2e7d32;
}

/* has event dot */
.day-cell.has-event::after {
  content: '';
  display: block;
  width: 5px;
  height: 5px;
  background: #f9a825;
  border-radius: 50%;
  margin: 2px auto 0;
}
.day-cell.today-cell.has-event::after { background: #fff; }

/* ── EVENTS PANEL ── */
.events-panel {
  margin: 0 16px 16px;
  border-radius: 12px;
  border: 2px solid #c8e6c9;
  overflow: hidden;
}
.events-header {
  background: linear-gradient(135deg, #2e7d32, #43a047);
  color: #fff;
  font-size: 15px;
  font-weight: bold;
  padding: 10px 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.events-header::before {
  content: '📅';
  font-size: 16px;
}
.events-body {
  background: #f9fbe7;
  padding: 10px 18px;
  min-height: 50px;
}
.events-body ul {
  list-style: none;
  padding: 0;
}
.events-body ul li {
  font-size: 13px;
  color: #333;
  padding: 5px 0;
  border-bottom: 1px dashed #dcedc8;
  line-height: 1.7;
  display: flex;
  align-items: flex-start;
  gap: 6px;
}
.events-body ul li::before {
  content: '◈';
  color: #2e7d32;
  flex-shrink: 0;
  margin-top: 2px;
}
.events-body ul li:last-child { border-bottom: none; }
.events-body .no-event {
  font-size: 13px;
  color: #bbb;
  text-align: center;
  padding: 10px 0;
}
</style>
</head>

      grid.appendChild(weekRow);
    }
    const jalNum = parseInt(toEn(String(day[0])));
    const isDisabled = day[5];
    const isHoliday = day[3];
    const events = day[4];

    const cell = document.createElement('div');
    cell.className = 'day-cell';
    if (isDisabled) cell.classList.add('disable-one');
    if (isHoliday) cell.classList.add('holiday');
    if (events && events.length > 0 && !isDisabled) cell.classList.add('has-event');
    if (!isDisabled && jalNum === todayFa.day && monthIdx === todayFa.month)
      cell.classList.add('today-cell');
    if (!isDisabled && jalNum === selectedDay && monthIdx === selectedMonth)
      cell.classList.add('selected-cell');

    cell.innerHTML = `<span class="jal">${toFa(day[0])}</span><span class="sub">${day[1]}<br>${day[2]}</span>`;

    if (!isDisabled) {
      cell.addEventListener('click', () => {
        selectedDay = jalNum;
        selectedMonth = monthIdx;
        buildGrid(monthIdx);
        showEvents(jalNum, monthIdx);
      });
    }
    weekRow.appendChild(cell);
    colCount++;
    if (colCount === 7) colCount = 0;
  });

  document.getElementById('activeMonthName').textContent = monthNames[monthIdx-1];
  document.getElementById('calYear').textContent = toFa(metaYear.year);
  const meta = metaYear.metaYear[monthIdx-1].split(' | ');
  document.getElementById('monthMeta').innerHTML = (meta[1]||'') + '<br>' + (meta[0]||'');

  document.querySelectorAll('.month-letter').forEach(el => {
    el.classList.remove('active-season-cr');
    if (parseInt(el.getAttribute('data-num')) === monthIdx)
      el.classList.add('active-season-cr');
  });
}

function showEvents(dayNum, monthIdx) {
  const monthData = calendarObject[monthIdx - 1];
  let events = [];
  monthData.forEach(day => {
    if (!day[5] && parseInt(toEn(String(day[0]))) === dayNum)
      events = day[4] || [];
  });
  document.getElementById('eventsTitle').textContent =
    `مناسبت‌های ${toFa(dayNum)} ${monthNames[monthIdx-1]}`;
  const list = document.getElementById('eventsList');
  const noEv = document.getElementById('noEvent');
  list.innerHTML = '';
  if (events.length === 0) {
    noEv.style.display = 'block';
  } else {
    noEv.style.display = 'none';
    events.forEach(ev => {
      const li = document.createElement('li');
      li.textContent = ev;
      list.appendChild(li);
    });
  }
}

document.querySelectorAll('.month-letter').forEach(el => {
  el.addEventListener('click', () => {
    activeMonth = parseInt(el.getAttribute('data-num'));
    if (activeMonth === todayFa.month) {
      selectedDay = todayFa.day;
      selectedMonth = todayFa.month;
    } else {
      selectedDay = null;
      selectedMonth = null;
    }
    buildGrid(activeMonth);
    if (selectedDay) showEvents(selectedDay, activeMonth);
    else {
      document.getElementById('eventsList').innerHTML = '';
      document.getElementById('noEvent').style.display = 'none';
      document.getElementById('eventsTitle').textContent = 'مناسبت‌های روز';
    }
  });
});

function updateClock() {
  const n = nowIran();
  const h = String(n.getHours()).padStart(2,'0');
  const m = String(n.getMinutes()).padStart(2,'0');
  const s = String(n.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = toFa(h+':'+m+':'+s);
}
updateClock();
setInterval(updateClock, 1000);

buildGrid(todayFa.month);
showEvents(todayFa.day, todayFa.month);
</script>
</body>
</html>
